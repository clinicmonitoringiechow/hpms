<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>HPMS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>HPMS</h1>
<h2>Health Program Monitoring System</h2>

<div class="form-box">

<div class="form-group">
  <label>Tanggal Register</label>
  <input type="date" id="tanggal_register" placeholder="Tanggal Register">
</div>

<div class="form-group">
  <label>No. KK</label>
  <input type="text" id="no_kk" placeholder="No. KK">
</div>

<div class="form-group">
  <label>No. NIK</label>
  <input type="text" id="nik" placeholder="NIK">
</div>

<div class="form-group">
  <label>No. Rekam Medik</label>
  <input type="text" id="no_rm" placeholder="No. Rekam Medik">
</div>

<div class="form-group">
  <label>Nama Lengkap</label>
  <input type="text" id="nama" placeholder="Nama">
</div>

<div class="form-group">
  <label>Tempat Lahir</label>
  <input type="text" id="tempat_lahir" placeholder="Tempat Lahir">
</div>

<div class="form-group">
  <label>Tanggal Lahir</label>
  <input type="date" id="tanggal_lahir">
</div>

<div class="form-group">
  <label>Jenis Kelamin</label>
  <select id="jk">
  <option>Laki-laki</option>
  <option>Perempuan</option>
  </select>
</div>

<div class="form-group">
  <label>Pendidikan Terakhir</label>
  <input type="text" id="pendidikan" placeholder="Pendidikan Terakhir">
</div>

<div class="form-group">
  <label>Pekerjaan</label>
  <input type="text" id="pekerjaan" placeholder="Pekerjaan">
</div>

<div class="form-group">
  <label>Asal Rujukan</label>
  <input type="text" id="rujukan" placeholder="Asal Rujukan">
</div>

<div class="form-group">
  <label>Alamat</label>
  <input type="text" id="alamat" placeholder="Alamat">
</div>

<div class="form-group">
  <label>No. HP</label>
  <input type="text" id="hp" placeholder="No HP">
</div>

<div class="form-group">
  <label>Email</label>
  <input type="email" id="email" placeholder="Email">
</div>

<div class="form-group">
  <label>No. BPJS</label>
  <input type="text" id="bpjs" placeholder="No BPJS">
</div>

<div class="form-group">
  <label>Suku / Kebangsaan</label>
  <input type="text" id="suku" placeholder="Suku/Kebangsaan">
</div>

<div class="form-group">
  <label>Alasan Pemeriksaan</label>
  <input type="text" id="alasan" placeholder="Alasan Pemeriksaan">
</div>

<div class="form-group">
  <label>Jenis Layanan</label>
  <input type="text" id="layanan" placeholder="Jenis Layanan">
</div>

<div class="form-group">
  <label>Populasi</label>
  <select id="populasi" placeholder="Kelompok Populasi">
  <option value="">-- Pilih --</option>
  <option>Laki - laki Seks Laki - Laki</option>
  <option>Waria</option>
  <option>Penasun</option>
  <option>Penyakit TB</option>
  <option>Penyakit IMS</option>
  <option>Penyakit Hepatitis</option>
  <option>Pelanggan PS</option>
  <option>Pasangan Risti</option>
  <option>Pasangan ODHIV</option>
  <option>Anak dari Ibu ODHIV</option>
  <option>Warga Binaan Pemasyarakatan</option>
  <option>Calon Pengantin</option>
  <option>Populasi Umum</option>
</div>

<div class="form-group">
  <label>Hasil HIV</label>
  <select id="hasil_hiv">
  <option value="">-- Pilih --</option>
  <option>Negatif</option>
  <option>Positif</option>
  </select>
</div>

<div class="form-group">
  <label>Hasil Sifilis</label>
  <select id="hasil_sifilis">
  <option value="">-- Pilih --</option>
  <option>Negatif</option>
  <option>Positif</option>
  </select>
</div>

<div class="form-group">
  <label>Hasil Hepatitis</label>
  <select id="hasil_hepatitis">
  <option value="">-- Pilih --</option>
  <option>Negatif</option>
  <option>Positif</option>
</select>
</div>

<button onclick="tambahData()">Simpan</button>

</div>

<h2>Data Pasien</h2>

<table>
<thead>
<tr>
<th>Nama</th>
<th>NIK</th>
<th>HIV</th>
<th>Sifilis</th>
<th>Hepatitis</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="dataPasien"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
