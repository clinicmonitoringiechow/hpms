<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>HPMS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>HPMS</h1>
<h2>Health Program Monitoring System</h2>

<div class="form-box">

<label>Tanggal Register</label>
<input type="date" id="tanggal_register">

<label>No. KK</label>
<input type="text" id="no_kk" placeholder="No. KK">

<label>No. NIK</label>
<input type="text" id="nik" placeholder="NIK">

<label>No. Rekam Medik</label>
<input type="text" id="no_rm" placeholder="No. Rekam Medik">

<label>Nama Lengkap</label>
<input type="text" id="nama" placeholder="Nama">

<label>Tempat Lahir</label>
<input type="text" id="tempat_lahir" placeholder="Tempat Lahir">

<label>Tanggal Lahir</label>
<input type="date" id="tanggal_lahir">

<label>Jenis Kelamin</label>
<select id="jk">
<option>Laki-laki</option>
<option>Perempuan</option>
</select>

<label>Pendidikan Terakhir</label>
<input type="text" id="pendidikan" placeholder="Pendidikan Terakhir">

<label>Pekerjaan</label>
<input type="text" id="pekerjaan" placeholder="Pekerjaan">

<label>Asal Rujukan</label>
<input type="text" id="rujukan" placeholder="Asal Rujukan">

<label>Alamat</label>
<input type="text" id="alamat" placeholder="Alamat">

<label>No. HP</label>
<input type="text" id="hp" placeholder="No HP">

<label>Email</label>
<input type="email" id="email" placeholder="Email">

<label>No. BPJS</label>
<input type="text" id="bpjs" placeholder="No BPJS">

<label>Suku / Kebangsaan</label>
<input type="text" id="suku" placeholder="Suku/Kebangsaan">

<label>Alasan Pemeriksaan</label>
<input type="text" id="alasan" placeholder="Alasan Pemeriksaan">

<label>Jenis Layanan</label>
<input type="text" id="layanan" placeholder="Jenis Layanan">

<label>Populasi</label>
<input type="text" id="populasi" placeholder="Kelompok Populasi">

<label>Hasil HIV</label>
<select id="hasil_hiv">
<option value="">-- Pilih --</option>
<option>Negatif</option>
<option>Positif</option>
</select>

<label>Hasil Sifilis</label>
<select id="hasil_sifilis">
<option value="">-- Pilih --</option>
<option>Negatif</option>
<option>Positif</option>
</select>

<label>Hasil Hepatitis</label>
<select id="hasil_hepatitis">
<option value="">-- Pilih --</option>
<option>Negatif</option>
<option>Positif</option>
</select>

<button onclick="tambahData()">Simpan</button>

</div>

<h2>Data Pasien</h2>

<table>
<thead>
<tr>
<th>Nama</th>
<th>NIK</th>
<th>Layanan</th>
<th>HIV</th>
<th>Sifilis</th>
<th>Hepatitis</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="dataPasien"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
